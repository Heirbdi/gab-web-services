        <div class="container">
            <h1 class="titre">GAB</h1>
            <p>Retrouver un guichet automatique les plus proches de vous !</p>
            <form action="" method="GET" style="width: 80%;margin: 0 auto;">
                <div class="form-group">
                    <select name="province" id="province">
                        <option default>Sélectionner une province</option>
                            <option value=""></option>
                    </select>

                    <select name="commune" id="commune">
                        <option value="">Sélectionnez une commune</option>
                    </select>

                    <select name="zone" id="zone">
                        <option value="">Sélectionnez une zone</option>
                    </select>
                    <select name="quartier" id="quartier">
                        <option value="">Sélectionnez un quartier</option>
                    </select>
                </div>
                <button name="search" class="btn" type="submit" style="width: 30%; margin: 0 auto; display: flex; margin-top: 1rem;justify-content: space-around;">Rechercher</button>
            </form>
        </div>
    </section>
    <div class="watsapp">
        <a class="watsapp" href="https://wa.me/25779909070" target="_blank" rel="noopener noreferrer">

        </a>
    </div>

    <div class="weater">
        <div class="mains">
            <section class="result">
                <div class="upper">
                    <figure class="name">
                        <figcaption>Burundi</figcaption> 
                        <img src="https://flagsapi.com/BI/shiny/32.png">
                    </figure>
        
                    <figure class="temperature">
                        <img src="https://openweathermap.org/img/wn/10d@4x.png">

                            <span>31</span>
                            <sup>o</sup>
                        </figcaption> 
                    </figure>
                    <p class="description">overcast clouds</p>
                </div>
                <ul>
                    <li>
                        <span class="ups">clouds</span>
                        <img src="./assets/images/cloud.png" alt="">

                    </li>
                    <li>
                        <span class="ups">humidity</span>
                        <img src="./assets/images/humidity.png" alt="">
                        <span id="humidity" class="dow">98</span>%
                    </li>
                    <li>
                        <span class="ups">pressure</span>
                        <img src="./assets/images/pression.png" alt="" style="width: 70px;">
                        <span id="pressure" class="dow">1011</span>hPa
                    </li>
                </ul>
            </section>
        </div>
